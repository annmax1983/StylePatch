function detectLang() {
  const raw = (navigator.language || 'en');
  const map = { 'zh-TW': 'zh-CN', 'zh-Hans': 'zh-CN' };
  const mapped = map[raw] || raw;
  const base = mapped.split('-')[0].toLowerCase();
  if (I18N[mapped]) return mapped;
  return I18N[base] ? base : 'en';
}

function apply(t) {
  document.title = t.title.replace(/🔒\s*/, '') + ' - FontFixer';
  document.getElementById('title').textContent = t.title;
  document.getElementById('updated').textContent = t.updated;
  document.getElementById('highlight').innerHTML = t.highlight;
  document.getElementById('h1').textContent = t.h1;
  document.getElementById('p1').innerHTML = t.p1;
  document.getElementById('l1').innerHTML = t.l1.map(i => '<li>' + i + '</li>').join('');
  document.getElementById('h2').textContent = t.h2;
  document.getElementById('p2').innerHTML = t.p2;
  document.getElementById('l2').innerHTML = t.l2.map(i => '<li>' + i + '</li>').join('');
  document.getElementById('p2note').innerHTML = t.p2note;
  document.getElementById('h3').textContent = t.h3;
  document.getElementById('p3').innerHTML = t.p3;
  document.getElementById('h4').textContent = t.h4;
  document.getElementById('p4').innerHTML = t.p4;
  document.getElementById('h5').textContent = t.h5;
  document.getElementById('p5').innerHTML = t.p5;
  document.getElementById('h6').textContent = t.h6;
  document.getElementById('p6').innerHTML = t.p6;
  document.getElementById('rights').textContent = t.rights;
  document.getElementById('gh').textContent = t.gh;
  document.documentElement.lang = detectLang();
}

apply(I18N[detectLang()]);
