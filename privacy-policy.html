function detectLang() {
  const code = (navigator.language || 'en').split('-')[0].toLowerCase();
  return I18N[code] ? code : 'en';
}

function apply(t) {
  document.title = t.title.replace(/🔒\s*/, '');
  document.getElementById('pageTitle').textContent = t.title;
  document.getElementById('updated').textContent = t.updated;
  document.getElementById('highlight').innerHTML = t.highlight;
  document.getElementById('hCollection').textContent = t.hCollection;
  document.getElementById('pCollection').innerHTML = t.pCollection;
  document.getElementById('listCollection').innerHTML = t.listCollection.map(i => '<li>' + i + '</li>').join('');
  document.getElementById('hStorage').textContent = t.hStorage;
  document.getElementById('pStorage').innerHTML = t.pStorage;
  document.getElementById('listStorage').innerHTML = t.listStorage.map(i => '<li>' + i + '</li>').join('');
  document.getElementById('pStorageNote').textContent = t.pStorageNote;
  document.getElementById('hPermissions').textContent = t.hPermissions;
  document.getElementById('listPermissions').innerHTML = t.listPermissions.map(i => '<li>' + i + '</li>').join('');
  document.getElementById('pPermissions').innerHTML = t.pPermissions;
  document.getElementById('hThirdParty').textContent = t.hThirdParty;
  document.getElementById('pThirdParty').innerHTML = t.pThirdParty;
  document.getElementById('hChanges').textContent = t.hChanges;
  document.getElementById('pChanges').textContent = t.pChanges;
  document.getElementById('hContact').textContent = t.hContact;
  document.getElementById('pContact').innerHTML = t.pContact;
  document.getElementById('footer').innerHTML = t.footer;
  document.documentElement.lang = detectLang();
}
