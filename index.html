<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support StylePatch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 820px;
      width: 100%;
      overflow: hidden;
    }

    /* ── Header banner ── */
    .banner {
      background: linear-gradient(135deg, #1a73e8 0%, #4a9eff 100%);
      padding: 36px 40px 32px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .banner-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
    }
    .banner-text h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .banner-text p {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.5;
    }

    /* ── Body two-column ── */
    .body {
      display: flex;
      gap: 0;
    }

    .col {
      flex: 1;
      padding: 32px 36px;
    }
    .col-left {
      border-right: 1px solid #eee;
    }

    .col h2 {
      font-size: 15px;
      font-weight: 600;
      color: #1a73e8;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .feature-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .feature-list li {
      font-size: 14px;
      line-height: 1.6;
      color: #444;
      padding-left: 22px;
      position: relative;
    }
    .feature-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1a73e8;
      opacity: 0.5;
    }

    .thank-text {
      font-size: 14px;
      line-height: 1.8;
      color: #555;
    }
    .thank-text p + p {
      margin-top: 12px;
    }
    .thank-text .heart {
      color: #e74c3c;
    }

    /* ── CTA ── */
    .cta {
      text-align: center;
      padding: 28px 36px 36px;
      border-top: 1px solid #eee;
    }
    .cta p {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }
    .cta .disclaimer {
      font-size: 11px;
      color: #aaa;
      margin-top: 12px;
      margin-bottom: 0;
      line-height: 1.5;
    }

    .kofi-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: #72a4f2;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(114, 164, 242, 0.35);
    }
    .kofi-btn:hover {
      background: #5b8ee0;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(114, 164, 242, 0.4);
    }
    .kofi-btn:active {
      transform: translateY(0);
    }
    .kofi-btn .btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .kofi-btn .btn-icon img {
      width: 32px;
      height: 26px;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 16px 36px 20px;
      font-size: 12px;
      color: #aaa;
    }
    .footer a {
      color: #1a73e8;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      body { padding: 12px; }
      .banner { padding: 24px 20px; flex-direction: column; text-align: center; }
      .body { flex-direction: column; }
      .col-left { border-right: none; border-bottom: 1px solid #eee; }
      .col { padding: 24px 20px; }
      .cta { padding: 24px 20px 28px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Banner -->
    <div class="banner">
      <div class="banner-icon">🎨</div>
      <div class="banner-text">
        <h1>StylePatch</h1>
        <p data-i18n="tagline"></p>
      </div>
    </div>

    <!-- Body: two columns -->
    <div class="body">
      <!-- Left: features -->
      <div class="col col-left">
        <h2 data-i18n="featuresTitle"></h2>
        <ul class="feature-list" id="featureList"></ul>
      </div>

      <!-- Right: thank you -->
      <div class="col">
        <h2 data-i18n="thankTitle"></h2>
        <div class="thank-text" id="thankText"></div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta">
      <p data-i18n="ctaHint"></p>
      <a class="kofi-btn" href="https://ko-fi.com/annmax?buyACoffee=true&ref=stylepatch" target="_blank" rel="noopener">
        <span class="btn-icon" id="kofiIcon">
          <img src="./assets/coffee.png" alt="Ko-fi" width="32" height="23">
        </span>
        <span data-i18n="btnText"></span>
      </a>
      <p class="disclaimer" data-i18n="disclaimer"></p>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://github.com/annmax1983/StylePatch" target="_blank" rel="noopener">GitHub</a>
      &nbsp;·&nbsp;
      <a href="https://annmax1983.github.io/StylePatch/privacy-policy.html" target="_blank" rel="noopener" data-i18n="privacyPolicy">Privacy Policy</a>
      &nbsp;·&nbsp; Copyright © 2026 StylePatch
    </div>
  </div>

      fr: {

        featuresTitle: '✨ Fonctionnalités',
        features: [
          'Personnalisez la couleur de fond et du texte sur n\'importe quel site',
          'Préréglages : Clair, Ton Chaud, Vert, Sombre',
          'Taille de police de 80 % à 150 %',
          'Paramètres par site, restauration automatique',

          'Prend en charge 6 langues : EN, ZH, JA, DE, ES, FR'
        ],
        thankTitle: '💌 Un petit mot pour vous',
        thank: [
          'Merci d\'utiliser StylePatch. Cet outil est né parce que je voulais que mes yeux soient plus à l\'aise pour naviguer tard le soir.',
          'S\'il vous aide aussi, c\'est déjà la plus belle récompense.',
          'Bien sûr, si vous souhaitez m\'offrir un <span class="heart">☕</span> café, cela me ferait très plaisir — et me motiverait à améliorer StylePatch encore davantage.'
        ],

        disclaimer: 'Les dons Ko-fi sont purement volontaires et n\'affectent aucune fonctionnalité. Le parrainage n\'est pas lié aux fonctionnalités — c\'est simplement une façon de montrer votre soutien.'
      }
    };

    // ============================================================
    //  Language detection (same logic as the extension popup)
    // ============================================================
    function detectLang() {
      const code = (navigator.language || 'en').split('-')[0].toLowerCase();
      return I18N[code] ? code : 'en';
    }

    // ============================================================
    //  Apply translations to DOM
    // ============================================================
    function applyLang(lang) {
      const t = I18N[lang];

      // Simple text nodes via data-i18n
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) {
          if (key === 'thank') return; // handled separately (HTML content)
          el.textContent = t[key];
        }
      });

      // Feature list
      const list = document.getElementById('featureList');
      list.innerHTML = t.features.map(f => `<li>${f}</li>`).join('');

      // Thank you paragraphs (allow HTML for <span class="heart">)
      const thankDiv = document.getElementById('thankText');
      thankDiv.innerHTML = t.thank.map(p => `<p>${p}</p>`).join('');

      // Update html lang attribute
      document.documentElement.lang = lang;
    }

    // ============================================================
    //  Init
    // ============================================================
    const lang = detectLang();
    applyLang(lang);
  </script>
</body>
</html>
