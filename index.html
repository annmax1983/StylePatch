<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support FontFixer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 820px;
      width: 100%;
      overflow: hidden;
    }
    .banner {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 36px 40px 32px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .banner-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
    }
    .banner-text h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .banner-text p { font-size: 14px; opacity: 0.85; line-height: 1.5; }
    .body { display: flex; gap: 0; }
    .col { flex: 1; padding: 32px 36px; }
    .col-left { border-right: 1px solid #eee; }
    .col h2 {
      font-size: 15px; font-weight: 600; color: #667eea;
      margin-bottom: 14px;
    }
    .feature-list {
      list-style: none; display: flex; flex-direction: column; gap: 10px;
    }
    .feature-list li {
      font-size: 14px; line-height: 1.6; color: #444;
      padding-left: 22px; position: relative;
    }
    .feature-list li::before {
      content: ''; position: absolute; left: 0; top: 8px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #667eea; opacity: 0.5;
    }
    .thank-text { font-size: 14px; line-height: 1.8; color: #555; }
    .thank-text p + p { margin-top: 12px; }
    .thank-text .heart { color: #e74c3c; }
    .cta {
      text-align: center; padding: 28px 36px 36px;
      border-top: 1px solid #eee;
    }
    .cta p { font-size: 13px; color: #888; margin-bottom: 16px; }
    .support-btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 36px; background: #667eea; color: #fff;
      font-size: 16px; font-weight: 600; text-decoration: none;
      border-radius: 10px; transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.35);
    }
    .support-btn:hover {
      background: #5a6fd6; transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
    .footer {
      text-align: center; padding: 16px 36px 20px;
      font-size: 12px; color: #aaa;
    }
    .footer a { color: #667eea; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 640px) {
      body { padding: 12px; }
      .banner { padding: 24px 20px; flex-direction: column; text-align: center; }
      .body { flex-direction: column; }
      .col-left { border-right: none; border-bottom: 1px solid #eee; }
      .col { padding: 24px 20px; }
      .cta { padding: 24px 20px 28px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="banner">
      <div class="banner-icon">🔤</div>
      <div class="banner-text">
        <h1>FontFixer</h1>
        <p data-i18n="tagline"></p>
      </div>
    </div>

    <div class="body">
      <div class="col col-left">
        <h2 data-i18n="featuresTitle"></h2>
        <ul class="feature-list" id="featureList"></ul>
      </div>
      <div class="col">
        <h2 data-i18n="thankTitle"></h2>
        <div class="thank-text" id="thankText"></div>
      </div>
    </div>

    <div class="cta">
      <p data-i18n="ctaHint"></p>
      <a class="support-btn" href="https://ko-fi.com/annmax?ref=fontfixer" target="_blank" rel="noopener">
        <img src="./assets/coffee.png" alt="" width="28" height="22" style="vertical-align:middle;margin-right:6px"> <span data-i18n="btnText"></span>
      </a>
    </div>

    <div class="footer">
      <a href="https://github.com/annmax1983/FontFixer" target="_blank" rel="noopener">GitHub</a>
      &nbsp;·&nbsp;
      <a href="https://annmax1983.github.io/FontFixer/privacy-policy.html" target="_blank" rel="noopener" data-i18n="privacyPolicy">Privacy Policy</a>
      &nbsp;·&nbsp; Copyright © 2026 FontFixer
    </div>
  </div>

  <script>

        features: ['读取本机已安装字体列表', '字号缩放 80%~160% 实时预览', '自定义文字色与链接色', '按站点独立保存字体配置', '一键排除指定网站', '完全本地处理，零网络请求'],
        thankTitle: '💌 想对你说',
        thank: ['感谢你使用 FontFixer。做这个工具是因为我经常遇到网站字体模糊、太小、难看的问题。', '如果它也帮到了你，那对我来说就是最好的回报。', '当然，如果你愿意请我喝一杯咖啡 <span class="heart">☕</span>，我会非常开心——这会让我更有动力继续打磨它。'],
        ctaHint: '点击下方按钮，跳转到支持页面',
        btnText: 'Support My Work',
        privacyPolicy: '隐私条款'
      },
      en: {
        tagline: 'Web font reading optimizer · One-click switch · Real-time preview · Fully local',
        featuresTitle: '✨ Features',
        features: ['Read all fonts installed on your device', 'Font size scaling 80%-160% with real-time preview', 'Custom text color and link color', 'Per-site font settings saved independently', 'One-click exclude specific websites', 'Fully local processing, zero network requests'],
        thankTitle: '💌 A Note to You',
        thank: ['Thank you for using FontFixer. I built this tool because I often encountered websites with blurry, small, or ugly fonts.', 'If it helps you too, that\'s already the best reward I could ask for.', 'Of course, if you\'d like to <span class="heart">☕</span> buy me a coffee, it would truly make my day — and keep me motivated to make FontFixer even better.'],
        ctaHint: 'Click the button below to visit the support page',
        btnText: 'Support My Work',
        privacyPolicy: 'Privacy Policy'
      },
      ja: {
        tagline: 'Webフォント閲覧最適化 · ワンクリック切替 · リアルタイムプレビュー · 完全ローカル',
        featuresTitle: '✨ 機能紹介',
        features: ['デバイスにインストールされた全フォントを読み取り', 'フォントサイズ80%~160%のリアルタイムプレビュー', 'カスタム文字色とリンク色', 'サイトごとにフォント設定を独立保存', 'ワンクリックで特定サイトを除外', '完全ローカル処理、ネットワークリクエストなし'],
        thankTitle: '💌 ご利用ありがとうございます',
        thank: ['FontFixerをご利用いただきありがとうございます。このツールは、ウェブサイトのフォントがぼやけていたり、小さかったり、見にくかったりする問題に经常遭遇して作りました。', 'もし皆様のお役にも立てているなら、それが何よりの喜びです。', 'もしよろしければ、コーヒーを <span class="heart">☕</span> 一杯おごっていただけると、とても嬉しいです。'],
        ctaHint: '下のボタンをクリックするとサポートページに移動します',
        btnText: 'Support My Work',
        privacyPolicy: 'プライバシーポリシー'
      },
      de: {
        tagline: 'Web-Schriften-Leser · Ein-Klick-Umschaltung · Echtzeit-Vorschau · Vollständig lokal',
        featuresTitle: '✨ Funktionen',
        features: ['Alle auf dem Gerät installierten Schriften auslesen', 'Schriftgröße 80%-160% mit Echtzeit-Vorschau', 'Benutzerdefinierte Text- und Linkfarbe', 'Websitespezifische Schrifteinstellungen', 'Ein-Klick-Ausschluss bestimmter Websites', 'Vollständig lokale Verarbeitung, keine Netzwerkanfragen'],
        thankTitle: '💌 Ein paar Worte an Sie',
        thank: ['Vielen Dank, dass Sie FontFixer nutzen. Ich habe dieses Tool gebaut, weil ich oft auf Webseiten mit unscharfen, kleinen oder hässlichen Schriften gestoßen bin.', 'Wenn es auch Ihnen hilft, ist das die beste Belohnung.', 'Wenn Sie mir gerne einen <span class="heart">☕</span> Kaffee ausgeben möchten, würde mich das sehr freuen.'],
        ctaHint: 'Klicken Sie auf die Schaltfläche unten, um zur Support-Seite zu gelangen',
        btnText: 'Support My Work',
        privacyPolicy: 'Datenschutzrichtlinie'
      },
      es: {
        tagline: 'Optimizador de fuentes web · Cambio con un clic · Vista previa en tiempo real · Completamente local',
        featuresTitle: '✨ Características',
        features: ['Lee todas las fuentes instaladas en tu dispositivo', 'Escala de tamaño 80%-160% con vista previa en tiempo real', 'Color de texto y enlace personalizados', 'Configuración de fuente por sitio guardada independientemente', 'Excluir sitios específicos con un clic', 'Procesamiento completamente local, sin solicitudes de red'],
        thankTitle: '💌 Unas palabras para ti',
        thank: ['Gracias por usar FontFixer. Construí esta herramienta porque frecuentemente encontraba sitios web con fuentes borrosas, pequeñas o feas.', 'Si también te ayuda a ti, esa ya es la mejor recompensa.', 'Por supuesto, si quieres invitarme a un <span class="heart">☕</span> café, me haría muy feliz.'],
        ctaHint: 'Haz clic en el botón de abajo para visitar la página de soporte',
        btnText: 'Support My Work',
        privacyPolicy: 'Política de Privacidad'
      },
      fr: {
        tagline: 'Optimiseur de polices web · Commutation en un clic · Aperçu en temps réel · Entièrement local',
        featuresTitle: '✨ Fonctionnalités',
        features: ['Lit toutes les polices installées sur votre appareil', 'Taille de police 80%-160% avec aperçu en temps réel', 'Couleur de texte et de lien personnalisées', 'Paramètres de police par site sauvegardés indépendamment', 'Exclure des sites spécifiques en un clic', 'Traitement entièrement local, aucune requête réseau'],
        thankTitle: '💌 Un petit mot pour vous',
        thank: ['Merci d\'utiliser FontFixer. J\'ai construit cet outil parce que je rencontrais souvent des sites avec des polices floues, petites ou laides.', 'S\'il vous aide aussi, c\'est déjà la plus belle récompense.', 'Bien sûr, si vous souhaitez m\'offrir un <span class="heart">☕</span> café, cela me ferait très plaisir.'],
        ctaHint: 'Cliquez sur le bouton ci-dessous pour accéder à la page de soutien',
        btnText: 'Support My Work',
        privacyPolicy: 'Politique de Confidentialité'
      }
    };

    function detectLang() {
      const raw = (navigator.language || 'en');
      const map = { 'zh-TW': 'zh', 'zh-Hans': 'zh', 'zh-Hant': 'zh' };
      const mapped = map[raw] || raw;
      const base = mapped.split('-')[0].toLowerCase();
      if (I18N[mapped]) return mapped;
      return I18N[base] ? base : 'en';
    }

    function applyLang(lang) {
      const t = I18N[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) {
          if (key === 'thank') return;
          el.textContent = t[key];
        }
      });
      const list = document.getElementById('featureList');
      list.innerHTML = t.features.map(f => `<li>${f}</li>`).join('');
      const thankDiv = document.getElementById('thankText');
      thankDiv.innerHTML = t.thank.map(p => `<p>${p}</p>`).join('');
      document.documentElement.lang = lang;
    }

    applyLang(detectLang());
  </script>
</body>
</html>
